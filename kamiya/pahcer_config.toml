[general]
version = "0.3.1"

[problem]
problem_name = "masters2026-final"
objective = "Max"
score_regex = '(?m)^\s*Score\s*=\s*(?P<score>\d+)\s*$'

[test]
start_seed = 0
end_seed = 20
threads = 0
out_dir = "./pahcer"

[[test.compile_steps]]
program = "g++"
args = ["-std=c++20", "-O2", "main.cpp"]

[[test.test_steps]]
program = "./a.out"
args = []
stdin = "./tools/in/{SEED04}.txt"
stdout = "./tools/out/{SEED04}.txt"
stderr = "./tools/err/{SEED04}.txt"
measure_time = true

[[test.test_steps]]
program = "python3"
args = [
    "../visualizer.py",
    "./tools/in/{SEED04}.txt",
    "./tools/out/{SEED04}.txt",
    "./tools/vis/{SEED04}.html"
]
measure_time = false
